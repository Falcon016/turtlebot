<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tb-grad" x1="80" y1="25" x2="520" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#72E3A3"/>
      <stop offset="55%" stop-color="#57C784"/>
      <stop offset="100%" stop-color="#2F6B4F"/>
