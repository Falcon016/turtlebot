  <text x="24" y="122" fill="url(#tb-grad)" font-family="Inter, Avenir Next, Segoe UI, Arial, sans-serif" font-size="98" font-weight="800" letter-spacing="0.5">TurtleBot</text>
  <text x="26" y="122" fill="#D8F3DF" fill-opacity="0.10" filter="url(#soft)" font-family="Inter, Avenir Next, Segoe UI, Arial, sans-serif" font-size="98" font-weight="800" letter-spacing="0.5">TurtleBot</text>
